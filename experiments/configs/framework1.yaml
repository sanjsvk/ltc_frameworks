# Framework 1 — Static Adstock Regression
# Parameters calibrated to data generating process (Position 1 — best-case)
# True STC decay: tv=0.55, search=0.20, social=0.45, display=0.50, video=0.60
# True LTC delta: tv=0.90, search=0.30, social=0.82, display=0.65, video=0.88

geo_adstock:
  decay_grid:
    tv:      [0.55, 0.70, 0.85, 0.90]
    search:  [0.20, 0.25, 0.30]
    social:  [0.45, 0.60, 0.75, 0.82]
    display: [0.50, 0.58, 0.65]
    video:   [0.60, 0.75, 0.88]
  feature: impressions
  channels: [tv, search, social, display, video]
  fit_intercept: true
  selection_metric: aic

weibull_adstock:
  max_lag: 52
  feature: impressions
  channels: [tv, search, social, display, video]
  max_lag_override:
    tv:      52
    search:  8
    social:  26
    display: 16
    video:   52
  shape_bounds:
    tv:      [0.8, 2.0]
    search:  [0.8, 1.5]
    social:  [0.8, 2.0]
    display: [0.8, 1.8]
    video:   [0.8, 2.0]
  scale_bounds:
    tv:      [6.0, 15.0]
    search:  [1.0, 3.0]
    social:  [3.0, 8.0]
    display: [1.5, 5.0]
    video:   [5.0, 14.0]

almon_pdl:
  stc_max_lag: 6
  stc_degree: 2
  ltc_degree: 3
  stc_cutoff: 6
  feature: impressions
  channels: [tv, search, social, display, video]
  ltc_max_lag_override:
    tv:      52
    search:  4
    social:  26
    display: 12
    video:   52

dual_adstock:
  feature: impressions
  channels: [tv, search, social, display, video]
  enforce_ltc_gt_stc: true
  stc_decay_grid:
    tv:      [0.45, 0.50, 0.55, 0.60, 0.65]
    search:  [0.10, 0.15, 0.20, 0.25, 0.30]
    social:  [0.35, 0.40, 0.45, 0.50, 0.55]
    display: [0.40, 0.45, 0.50, 0.55, 0.60]
    video:   [0.50, 0.55, 0.60, 0.65, 0.70]
  ltc_decay_grid:
    tv:      [0.82, 0.85, 0.88, 0.90, 0.92]
    search:  [0.20, 0.25, 0.30, 0.35]
    social:  [0.75, 0.78, 0.80, 0.82, 0.85]
    display: [0.58, 0.62, 0.65, 0.68, 0.72]
    video:   [0.82, 0.85, 0.88, 0.90]
